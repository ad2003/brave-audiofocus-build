name: Brave AudioFocus APK Patcher

on:
  workflow_dispatch:
    inputs:
      brave_version:
        description: 'Brave Version z.B. v1.89.135 (leer = neueste stable)'
        required: false
        default: ''
      arch:
        description: 'CPU Architektur'
        required: true
        default: 'arm64'
        type: choice
        options:
          - arm64
          - arm32

jobs:
  patch:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget curl unzip zip python3 openjdk-17-jdk zipalign apksigner
          java -version

      - name: Get Brave version
        run: |
          if [ -n "${{ github.event.inputs.brave_version }}" ]; then
            VERSION="${{ github.event.inputs.brave_version }}"
          else
            VERSION=$(curl -sf "https://api.github.com/repos/brave/brave-browser/releases" \
              | python3 -c "
          import sys, json
          for r in json.load(sys.stdin):
              if not r['prerelease'] and not r['draft']:
                  if 'Nightly' not in r['name'] and 'Beta' not in r['name']:
                      print(r['tag_name'])
                      break
          ")
          fi
          echo "Brave Version: $VERSION"
          echo "BRAVE_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Download Brave APK
        run: |
          VERSION="${BRAVE_VERSION}"
          ARCH="${{ github.event.inputs.arch }}"

          if [ "$ARCH" = "arm64" ]; then
            APK_NAME="Bravearm64Universal.apk"
          else
            APK_NAME="BraveMonoarm.apk"
          fi

          APK_URL="https://github.com/brave/brave-browser/releases/download/${VERSION}/${APK_NAME}"
          echo "Download: ${APK_URL}"

          curl -L --retry 3 --retry-delay 5 --output brave_original.apk "${APK_URL}"

          if ! unzip -t brave_original.apk > /dev/null 2>&1; then
            echo "❌ Keine gültige APK!"
            file brave_original.apk
            exit 1
          fi

          echo "✓ APK: $(du -sh brave_original.apk | cut -f1)"

      - name: Extract APK
        run: |
          mkdir -p apk_extracted
          unzip -q -o brave_original.apk -d apk_extracted
          echo "DEX Dateien:"
          find apk_extracted -name "*.dex" -exec ls -lh {} \;

      - name: Patch DEX (AudioFocus fix)
        run: |
          python3 patches/apply_patch.py apk_extracted

      - name: Repackage APK
        run: |
          cd apk_extracted
          rm -rf META-INF/

          # Dateien die UNCOMPRESSED sein müssen (Android API 30+ Pflicht):
          # - lib/*.so  → Android mappt sie per mmap direkt
          # - resources.arsc → muss 4-byte-aligned und uncompressed sein
          # Alles andere: komprimiert

          # 1. Uncompressed: .so Dateien
          if find lib -name "*.so" 2>/dev/null | grep -q .; then
            echo "Füge .so Dateien uncompressed hinzu..."
            find lib -name "*.so" | zip -0 -@ ../brave_repacked.apk
          fi

          # 2. Uncompressed: resources.arsc
          if [ -f resources.arsc ]; then
            echo "Füge resources.arsc uncompressed hinzu..."
            zip -0 ../brave_repacked.apk resources.arsc
          fi

          # 3. Alles andere komprimiert (außer .so und resources.arsc)
          echo "Füge restliche Dateien komprimiert hinzu..."
          find . -type f \
            ! -path './lib/*.so' \
            ! -name 'resources.arsc' \
            | zip -9 -@ ../brave_repacked.apk

          cd ..
          echo "✓ Repacked: $(du -sh brave_repacked.apk | cut -f1)"
          unzip -t brave_repacked.apk > /dev/null && echo "✓ ZIP valide"

      - name: Zipalign
        run: |
          zipalign -p -f 4 brave_repacked.apk brave_aligned.apk
          echo "✓ Aligned: $(du -sh brave_aligned.apk | cut -f1)"

      - name: Sign APK
        run: |
          keytool -genkeypair \
            -keystore debug.jks -alias debugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android123 -keypass android123 \
            -dname "CN=AudioFocusPatch,O=Patch,C=DE" 2>/dev/null

          apksigner sign \
            --ks debug.jks --ks-key-alias debugkey \
            --ks-pass pass:android123 --key-pass pass:android123 \
            --out brave_signed.apk \
            brave_aligned.apk

          apksigner verify brave_signed.apk && echo "✓ Signatur OK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: brave-${{ env.BRAVE_VERSION }}-audiofocus-patched
          path: brave_signed.apk
          retention-days: 30

      - name: Summary
        run: |
          echo "## ✅ Patch erfolgreich" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | \`${BRAVE_VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Patch** | AUDIOFOCUS_GAIN → AUDIOFOCUS_GAIN_TRANSIENT_MAY_DUCK |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ⚠️ Brave vorher deinstallieren: \`adb uninstall com.brave.browser\`" >> $GITHUB_STEP_SUMMARY
