name: Brave AudioFocus APK Patcher

on:
  workflow_dispatch:
    inputs:
      brave_version:
        description: 'Brave Version (leer = automatisch neueste)'
        required: false
        default: ''

jobs:
  patch:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget unzip openjdk-17-jdk python3 aapt zipalign
          java -version

      - name: Download apktool
        run: |
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O apktool.jar
          wget -q https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool -O apktool
          chmod +x apktool
          echo "apktool ready"

      - name: Download uber-apk-signer
        run: |
          wget -q https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar -O uber-apk-signer.jar
          echo "signer ready"

      - name: Download latest Brave APK
        run: |
          if [ -n "${{ github.event.inputs.brave_version }}" ]; then
            VERSION="${{ github.event.inputs.brave_version }}"
          else
            VERSION=$(curl -s https://api.github.com/repos/brave/brave-browser/releases/latest | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          fi
          echo "Brave Version: $VERSION"
          echo "BRAVE_VERSION=$VERSION" >> $GITHUB_ENV

          # Download ARM64 APK von GitHub Releases
          APK_URL="https://github.com/brave/brave-browser/releases/download/${VERSION}/Bravearm64Universal.apk"
          echo "Download: $APK_URL"
          wget -q --show-progress "$APK_URL" -O brave_original.apk
          ls -lh brave_original.apk

      - name: Decompile APK
        run: |
          java -jar apktool.jar d brave_original.apk -o brave_decompiled -f
          echo "Decompiled. Smali files:"
          find brave_decompiled/smali* -name "AudioFocusDelegate.smali" 2>/dev/null || echo "not found yet"

      - name: Apply AudioFocus patch
        run: |
          python3 patches/apply_patch.py brave_decompiled

      - name: Recompile APK
        run: |
          java -jar apktool.jar b brave_decompiled -o brave_patched_unsigned.apk
          ls -lh brave_patched_unsigned.apk

      - name: Sign APK
        run: |
          java -jar uber-apk-signer.jar \
            -a brave_patched_unsigned.apk \
            --allowResign \
            -o output/
          ls -lh output/

      - name: Rename output
        run: |
          cd output
          for f in *-aligned-signed.apk; do
            mv "$f" "brave-${BRAVE_VERSION}-audiofocus-patched.apk"
          done
          ls -lh

      - name: Upload patched APK
        uses: actions/upload-artifact@v4
        with:
          name: brave-audiofocus-patched-${{ env.BRAVE_VERSION }}
          path: output/*.apk
          retention-days: 30
