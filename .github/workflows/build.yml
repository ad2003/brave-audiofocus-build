name: Brave AudioFocus APK Patcher

on:
  workflow_dispatch:
    inputs:
      brave_version:
        description: 'Brave Version z.B. v1.89.132 (leer = neueste)'
        required: false
        default: ''

jobs:
  patch:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Install Java and tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget curl unzip python3 openjdk-17-jdk
          java -version
          python3 --version

      - name: Download apktool
        run: |
          wget -q "https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar" -O apktool.jar
          echo "apktool.jar downloaded: $(ls -lh apktool.jar)"

      - name: Download uber-apk-signer
        run: |
          wget -q "https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar" -O uber-apk-signer.jar
          echo "uber-apk-signer.jar downloaded: $(ls -lh uber-apk-signer.jar)"

      - name: Get Brave version and APK URL
        id: brave_info
        run: |
          # Version bestimmen
          if [ -n "${{ github.event.inputs.brave_version }}" ]; then
            VERSION="${{ github.event.inputs.brave_version }}"
            API_URL="https://api.github.com/repos/brave/brave-browser/releases/tags/${VERSION}"
          else
            API_URL="https://api.github.com/repos/brave/brave-browser/releases/latest"
          fi

          echo "API URL: $API_URL"
          RELEASE_JSON=$(curl -sf "$API_URL")

          VERSION=$(echo "$RELEASE_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          echo "Version: $VERSION"
          echo "BRAVE_VERSION=$VERSION" >> $GITHUB_ENV

          # Alle APK Assets auflisten
          echo "Alle APK Assets:"
          echo "$RELEASE_JSON" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for a in data.get('assets', []):
              if a['name'].endswith('.apk'):
                  print(f\"  {a['name']}\")
                  print(f\"  {a['browser_download_url']}\")
          "

          # arm64 APK URL finden
          APK_URL=$(echo "$RELEASE_JSON" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assets = data.get('assets', [])
          # Suche nach arm64 APK
          for a in assets:
              name = a['name'].lower()
              if name.endswith('.apk') and 'arm64' in name:
                  print(a['browser_download_url'])
                  break
          else:
              # Fallback: erste APK
              for a in assets:
                  if a['name'].lower().endswith('.apk'):
                      print(a['browser_download_url'])
                      break
          ")

          if [ -z "$APK_URL" ]; then
            echo "FEHLER: Keine APK gefunden!"
            exit 1
          fi

          echo "APK URL: $APK_URL"
          echo "APK_URL=$APK_URL" >> $GITHUB_ENV

      - name: Download Brave APK
        run: |
          echo "Lade APK von: $APK_URL"
          wget -q --show-progress "$APK_URL" -O brave_original.apk
          ls -lh brave_original.apk
          file brave_original.apk

      - name: Decompile APK
        run: |
          java -jar apktool.jar d brave_original.apk -o brave_decompiled -f 2>&1
          echo ""
          echo "Dekompiliert. Suche AudioFocusDelegate.smali:"
          find brave_decompiled -name "AudioFocusDelegate.smali" 2>/dev/null | head -5

      - name: Apply AudioFocus patch
        run: |
          python3 patches/apply_patch.py brave_decompiled

      - name: Recompile APK
        run: |
          java -jar apktool.jar b brave_decompiled -o brave_patched_unsigned.apk 2>&1
          ls -lh brave_patched_unsigned.apk

      - name: Create output directory
        run: mkdir -p output

      - name: Sign APK
        run: |
          java -jar uber-apk-signer.jar \
            --apks brave_patched_unsigned.apk \
            --allowResign \
            --out output
          echo ""
          echo "Signiert:"
          ls -lh output/

      - name: Rename final APK
        run: |
          cd output
          for f in *.apk; do
            NEWNAME="brave-${BRAVE_VERSION}-audiofocus-patched.apk"
            mv "$f" "$NEWNAME"
            echo "Umbenannt: $f -> $NEWNAME"
          done
          ls -lh

      - name: Upload patched APK
        uses: actions/upload-artifact@v4
        with:
          name: brave-audiofocus-patched
          path: output/*.apk
          retention-days: 30
