name: Brave AudioFocus APK Patcher

on:
  workflow_dispatch:
    inputs:
      brave_version:
        description: 'Brave Version z.B. v1.89.135 (leer = neueste stable)'
        required: false
        default: ''
      arch:
        description: 'CPU Architektur'
        required: true
        default: 'arm64'
        type: choice
        options:
          - arm64
          - arm32

jobs:
  patch:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl python3 openjdk-17-jdk zipalign apksigner

      - name: Get Brave version
        run: |
          if [ -n "${{ github.event.inputs.brave_version }}" ]; then
            VERSION="${{ github.event.inputs.brave_version }}"
          else
            VERSION=$(curl -sf "https://api.github.com/repos/brave/brave-browser/releases" \
              | python3 -c "
          import sys, json
          for r in json.load(sys.stdin):
              if not r['prerelease'] and not r['draft']:
                  if 'Nightly' not in r['name'] and 'Beta' not in r['name']:
                      print(r['tag_name'])
                      break
          ")
          fi
          echo "BRAVE_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Version: $VERSION"

      - name: Download Brave APK
        run: |
          ARCH="${{ github.event.inputs.arch }}"
          APK_NAME="Bravearm64Universal.apk"
          [ "$ARCH" = "arm32" ] && APK_NAME="BraveMonoarm.apk"
          APK_URL="https://github.com/brave/brave-browser/releases/download/${BRAVE_VERSION}/${APK_NAME}"
          echo "Download: ${APK_URL}"
          curl -L --retry 3 --output brave_original.apk "${APK_URL}"
          echo "✓ $(du -sh brave_original.apk | cut -f1)"

      # ── DIAGNOSE: Alle Audio/Media relevanten Strings finden ──
      - name: Analyze DEX (Audio/Media strings)
        run: |
          python3 - << 'PYEOF'
          import zipfile, re

          targets = [
              b"AudioFocusDelegate",
              b"requestAudioFocus",
              b"AudioFocusManager",
              b"MediaSession",
              b"MediaSessionCompat",
              b"AUDIOFOCUS_GAIN",
              b"abandonAudioFocus",
          ]

          with zipfile.ZipFile("brave_original.apk", 'r') as z:
              for name in sorted(z.namelist()):
                  if not name.endswith('.dex'):
                      continue
                  data = z.read(name)
                  hits = [t.decode() for t in targets if t in data]
                  if hits:
                      print(f"{name} ({len(data)/1024:.0f} KB): {', '.join(hits)}")
          PYEOF

      - name: Patch DEX
        id: patch
        run: |
          python3 patches/audiofocus_patch_precise.py brave_original.apk brave_patched.apk
          echo "PATCH_OK=true" >> $GITHUB_ENV
        continue-on-error: true

      - name: Fallback wenn Patch fehlschlägt
        if: env.PATCH_OK != 'true'
        run: |
          echo "⚠️ Patch fehlgeschlagen - verwende Original"
          cp brave_original.apk brave_patched.apk

      - name: Zipalign
        run: zipalign -p -f 4 brave_patched.apk brave_aligned.apk

      - name: Sign APK
        run: |
          keytool -genkeypair \
            -keystore debug.jks -alias debugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android123 -keypass android123 \
            -dname "CN=AudioFocusPatch,O=Patch,C=DE" 2>/dev/null
          apksigner sign \
            --ks debug.jks --ks-key-alias debugkey \
            --ks-pass pass:android123 --key-pass pass:android123 \
            --out brave_signed.apk brave_aligned.apk
          apksigner verify brave_signed.apk && echo "✓ Signiert"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: brave-${{ env.BRAVE_VERSION }}-audiofocus-patched
          path: brave_signed.apk
          retention-days: 30
