name: Brave AudioFocus APK Patcher

on:
  workflow_dispatch:
    inputs:
      brave_version:
        description: 'Brave Version z.B. v1.89.135 (leer = neueste stable)'
        required: false
        default: ''

jobs:
  patch:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget curl unzip python3 openjdk-17-jdk
          java -version

      - name: Download apktool
        run: |
          wget -q "https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar" -O apktool.jar
          ls -lh apktool.jar

      - name: Download uber-apk-signer
        run: |
          wget -q "https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar" -O uber-apk-signer.jar
          ls -lh uber-apk-signer.jar

      - name: Get Brave version
        run: |
          if [ -n "${{ github.event.inputs.brave_version }}" ]; then
            VERSION="${{ github.event.inputs.brave_version }}"
          else
            VERSION=$(curl -sf "https://api.github.com/repos/brave/brave-browser/releases/latest" | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          fi
          echo "Brave Version: $VERSION"
          echo "BRAVE_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Download Brave APK
        run: |
          VERSION="${BRAVE_VERSION}"
          APK_PATH=$(curl -sL "https://github.com/brave/brave-browser/releases/expanded_assets/${VERSION}" \
            | grep -oP '(?<=href=")[^"]*\.apk' \
            | grep -i "arm64" \
            | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "FEHLER: Keine arm64 APK fuer ${VERSION} gefunden!"
            exit 1
          fi
          APK_URL="https://github.com${APK_PATH}"
          echo "Download: ${APK_URL}"
          curl -L --output brave_original.apk "${APK_URL}"
          ls -lh brave_original.apk

      - name: Decompile APK
        run: |
          java -jar apktool.jar d brave_original.apk -o brave_decompiled -f --only-main-classes
          echo "Suche AudioFocusDelegate.smali:"
          find brave_decompiled -name "AudioFocusDelegate.smali"

      - name: Apply AudioFocus patch
        run: |
          python3 patches/apply_patch.py brave_decompiled

      - name: Recompile APK
        run: |
          java -jar apktool.jar b brave_decompiled -o brave_patched_unsigned.apk --use-aapt2
          ls -lh brave_patched_unsigned.apk

      - name: Sign APK
        run: |
          mkdir -p output
          java -jar uber-apk-signer.jar \
            --apks brave_patched_unsigned.apk \
            --allowResign \
            --out output
          ls -lh output/

      - name: Rename final APK
        run: |
          cd output
          for f in *.apk; do
            mv "$f" "brave-${BRAVE_VERSION}-audiofocus-patched.apk"
          done
          ls -lh

      - name: Upload patched APK
        uses: actions/upload-artifact@v4
        with:
          name: brave-audiofocus-patched
          path: output/*.apk
          retention-days: 30
